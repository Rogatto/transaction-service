spring.application.name=transaction-service

# Risk API URL (should be an HTTP GET endpoint returning {"result":"allowed"} or {"result":"notAllowed"})
risk.api.url=http://localhost:1080/risk

# Kafka
kafka.bootstrap-servers=localhost:9092
kafka.topic.transactions=transactions
# Disable Kafka in tests by default. Set to true in environments where Kafka is available.
kafka.enabled=true

# Dead-letter topic for transactions when risk service is unavailable after retries
kafka.topic.dead-letter=transaction-dead-letter

